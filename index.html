<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="里山地図" />
  <meta name="theme-color" content="#1b5e20" />
  <title>里山調査地図</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="stylesheet" href="vendor/leaflet.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- 地図本体 -->
  <div id="map" aria-label="地図"></div>

  <!-- 上部ステータスバー：オンライン/オフライン・GPS状態 -->
  <header id="statusbar" class="statusbar">
    <div id="net-status" class="status-chip" role="status">
      <span class="dot"></span><span class="label">確認中</span>
    </div>
    <div id="gps-status" class="status-chip" role="status">
      <span class="dot"></span><span class="label">GPS待機</span>
    </div>
  </header>

  <!-- 範囲指定（ファインダー）枠：保存モード時のみ表示 -->
  <div id="finder" class="finder hidden" aria-hidden="true">
    <div class="finder-box"></div>
    <div id="finder-info" class="finder-info">範囲を枠に合わせてください</div>
  </div>

  <!-- 右下の主要操作ボタン群 -->
  <div class="fab-stack">
    <button id="btn-locate" class="fab fab-locate" aria-label="現在地に戻る" title="現在地に戻る">
      <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="currentColor" d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8Zm9 3h-2.06A7 7 0 0 0 13 5.06V3h-2v2.06A7 7 0 0 0 5.06 11H3v2h2.06A7 7 0 0 0 11 18.94V21h2v-2.06A7 7 0 0 0 18.94 13H21v-2Zm-9 6a5 5 0 1 1 0-10 5 5 0 0 1 0 10Z"/></svg>
    </button>
    <button id="btn-satomichi" class="fab fab-satomichi" aria-label="里道モード" aria-pressed="false" title="里道モード（筆の塗りを強調）">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M4 21 10 3h1.5l2 8.5L15.5 3H17l6 18h-2.1l-1.5-4.6h-4.9L13 21h-2l-1-4.6H5.1L3.5 21H4Zm5.7-6.6h3.9L11.6 8l-1.9 6.4Z"/></svg>
    </button>
    <button id="btn-terrain" class="fab fab-terrain" aria-label="地形" aria-pressed="false" title="地形（陰影起伏図を重ねる）">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true"><path fill="currentColor" d="M14 4 22 20H6L14 4Zm-6.5 8.2L9.8 20H2l5.5-7.8ZM14 8.4 19.3 18h-4.1l-2-4-1.7 3-1.6-2.6L14 8.4Z"/></svg>
    </button>
  </div>

  <!-- 下部の主要アクションバー（引き算設計：最小限） -->
  <nav id="actionbar" class="actionbar">
    <button id="btn-memo" class="action action-primary" aria-label="メモを追加">
      <span class="ico">📍</span><span class="txt">メモを追加</span>
    </button>
    <button id="btn-list" class="action" aria-label="メモ一覧を見る">
      <span class="ico">📋</span><span class="txt">メモ一覧</span>
    </button>
    <button id="btn-save" class="action" aria-label="地図を保存">
      <span class="ico">⬇️</span><span class="txt">地図を保存</span>
    </button>
  </nav>

  <!-- ===== メモ追加シート（定型文） ===== -->
  <div id="memo-sheet" class="sheet hidden" role="dialog" aria-modal="true" aria-label="メモを追加">
    <div class="sheet-panel">
      <div class="sheet-head">
        <h2>この地点にメモ</h2>
        <button class="sheet-close" data-close="memo-sheet" aria-label="閉じる">✕</button>
      </div>
      <p class="sheet-sub" id="memo-coord">緯度・経度を取得中…</p>
      <div class="memo-grid">
        <button class="memo-btn" data-memo="分かれ道" data-icon="🔀"><span class="m-ico">🔀</span><span class="m-txt">分かれ道</span></button>
        <button class="memo-btn" data-memo="倒木あり" data-icon="🌲"><span class="m-ico">🌲</span><span class="m-txt">倒木あり</span></button>
        <button class="memo-btn" data-memo="水場（水源）" data-icon="💧"><span class="m-ico">💧</span><span class="m-txt">水場（水源）</span></button>
        <button class="memo-btn memo-other" data-memo="__other__" data-icon="✏️"><span class="m-ico">✏️</span><span class="m-txt">その他</span></button>
      </div>
      <div id="memo-other-area" class="memo-other-area hidden">
        <textarea id="memo-text" rows="3" placeholder="内容を入力してください" maxlength="500"></textarea>
        <button id="memo-other-save" class="action action-primary full">この内容で保存</button>
      </div>
    </div>
  </div>

  <!-- ===== メモ一覧シート ===== -->
  <div id="list-sheet" class="sheet hidden" role="dialog" aria-modal="true" aria-label="メモ一覧">
    <div class="sheet-panel sheet-tall">
      <div class="sheet-head">
        <h2>メモ一覧 <span id="list-count" class="count">0</span></h2>
        <button class="sheet-close" data-close="list-sheet" aria-label="閉じる">✕</button>
      </div>
      <div id="list-body" class="list-body"></div>
    </div>
  </div>

  <!-- ===== 地図保存シート（進捗） ===== -->
  <div id="save-sheet" class="sheet hidden" role="dialog" aria-modal="true" aria-label="地図を保存">
    <div class="sheet-panel">
      <div class="sheet-head">
        <h2>このエリアを保存</h2>
        <button class="sheet-close" data-close="save-sheet" aria-label="閉じる">✕</button>
      </div>
      <p class="sheet-sub" id="save-estimate">範囲を計算中…</p>
      <div id="save-progress-wrap" class="progress-wrap hidden">
        <div class="progress-track"><div id="save-progress-bar" class="progress-bar"></div></div>
        <p id="save-progress-text" class="progress-text">0 / 0 枚</p>
      </div>
      <button id="save-start" class="action action-primary full">この範囲を保存する</button>
      <button id="save-cancel" class="action full hidden">中止する</button>
      <p class="sheet-note">枠内の地図（ズーム15〜18）を端末に保存します。広すぎる場合は地図を拡大してください。</p>
    </div>
  </div>

  <!-- トースト通知 -->
  <div id="toast" class="toast hidden" role="alert"></div>

  <!-- スクリプト群 -->
  <script src="vendor/leaflet.js"></script>
  <script src="js/db.js"></script>
  <script src="js/tilelayer.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
